name: Release and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release and Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if GitHub release already exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" --json tagName > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if npm version already exists
        id: check_npm
        run: |
          PACKAGE_NAME=$(jq -r '.name' package.json)
          VERSION="${{ steps.version.outputs.version }}"
          PUBLISHED=$(npm view "${PACKAGE_NAME}@${VERSION}" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write check results to summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          GH_EXISTS="${{ steps.check_release.outputs.exists }}"
          NPM_EXISTS="${{ steps.check_npm.outputs.exists }}"

          echo "## Release Checks for \`${TAG}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          if [ "$GH_EXISTS" = "true" ]; then
            echo "| GitHub Release \`${TAG}\` | ⚠️ Already exists — skipping release creation |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| GitHub Release \`${TAG}\` | ✅ Not found — will create |" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$NPM_EXISTS" = "true" ]; then
            echo "| npm \`${VERSION}\` | ⚠️ Already published — skipping npm publish |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| npm \`${VERSION}\` | ✅ Not found — will publish |" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Node.js with npm registry auth
        if: steps.check_npm.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Create tag and release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --latest

      - name: Publish to npm
        if: steps.check_npm.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
