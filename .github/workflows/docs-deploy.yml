name: Docs — Deploy to GitHub Pages

# One-time setup (manual, after first run):
#   Settings → Pages → Source: "Deploy from a branch" → gh-pages / (root)
#   Settings → Actions → General → Workflow permissions: "Read and write"
# The gh-pages branch is auto-created on first successful deploy.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'vocs.config.ts'
      - 'package.json'
      - 'bun.lock'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and publish to gh-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright chromium (for Vocs mermaid rendering)
        run: bunx playwright install --with-deps chromium

      - name: Build docs
        run: bun run docs:build
        env:
          BASE_PATH: /claude-second-brain

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/dist
          publish_branch: gh-pages
          keep_files: true
          force_orphan: false
