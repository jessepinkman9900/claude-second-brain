name: Pack Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pack-test:
    name: Pack and scaffold test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pack
        run: npm pack

      - name: Scaffold via npx
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx -y "claude-second-brain-${VERSION}.tgz" test-vault

      - name: Verify scaffold
        run: |
          set -e
          fail=0

          check() {
            local label="$1"
            local path="$2"
            if [ -e "$path" ]; then
              echo "PASS: $label"
            else
              echo "FAIL: $label — $path not found"
              fail=1
            fi
          }

          check ".gitignore (not .gitignore.template)"     test-vault/.gitignore
          check "wiki/index.md"                            test-vault/wiki/index.md
          check "wiki/log.md"                              test-vault/wiki/log.md
          check "wiki/overview.md"                         test-vault/wiki/overview.md
          check "wiki/sources/"                            test-vault/wiki/sources
          check "wiki/qa/"                                 test-vault/wiki/qa
          check "raw-sources/articles/"                    test-vault/raw-sources/articles
          check "raw-sources/pdfs/"                        test-vault/raw-sources/pdfs
          check "raw-sources/personal/"                    test-vault/raw-sources/personal
          check ".claude/skills/setup"                     test-vault/.claude/skills/setup
          check ".claude/skills/brain-ingest"              test-vault/.claude/skills/brain-ingest
          check ".claude/skills/brain-search"              test-vault/.claude/skills/brain-search
          check ".claude/skills/brain-refresh"             test-vault/.claude/skills/brain-refresh
          check ".claude/skills/brain-rebuild"             test-vault/.claude/skills/brain-rebuild
          check ".claude/skills/lint"                      test-vault/.claude/skills/lint
          check ".claude/skills/qmd-cli"                   test-vault/.claude/skills/qmd-cli
          check "scripts/qmd/setup.ts"                     test-vault/scripts/qmd/setup.ts
          check "scripts/qmd/reindex.ts"                   test-vault/scripts/qmd/reindex.ts
          check "scripts/qmd/package.json"                 test-vault/scripts/qmd/package.json
          check "CLAUDE.md"                                test-vault/CLAUDE.md
          check "mise.toml"                                test-vault/mise.toml
          check "~/.claude/skills/brain-ingest/SKILL.md"   "$HOME/.claude/skills/brain-ingest/SKILL.md"
          check "~/.claude/skills/brain-search/SKILL.md"   "$HOME/.claude/skills/brain-search/SKILL.md"
          check "~/.claude/skills/brain-refresh/SKILL.md"  "$HOME/.claude/skills/brain-refresh/SKILL.md"

          grep_check() {
            local label="$1"
            local pattern="$2"
            local file="$3"
            if grep -q "$pattern" "$file" 2>/dev/null; then
              echo "PASS: $label"
            else
              echo "FAIL: $label — pattern '$pattern' not found in $file"
              fail=1
            fi
          }

          grep_check "CLAUDE.md INDEX_PATH is absolute"           "INDEX_PATH=/"  test-vault/CLAUDE.md
          grep_check "setup.ts DB is hardcoded absolute path"     'const DB = "/' test-vault/scripts/qmd/setup.ts
          grep_check "global brain-ingest INDEX_PATH is absolute"  "INDEX_PATH=/" "$HOME/.claude/skills/brain-ingest/SKILL.md"
          grep_check "global brain-search INDEX_PATH is absolute"  "INDEX_PATH=/" "$HOME/.claude/skills/brain-search/SKILL.md"
          grep_check "global brain-refresh INDEX_PATH is absolute" "INDEX_PATH=/" "$HOME/.claude/skills/brain-refresh/SKILL.md"

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more checks failed."
            exit 1
          fi

          echo ""
          echo "All checks passed."

      - name: Clean up
        if: always()
        run: |
          rm -rf test-vault
          VERSION=$(node -p "require('./package.json').version")
          rm -f "claude-second-brain-${VERSION}.tgz"
          gh repo delete test-vault --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
