name: Pack Test

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  pack-test:
    name: Pack and scaffold test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@10.8.0

      - name: Pack
        run: npm pack

      - name: Scaffold via npx
        run: |
          VERSION=$(node -p "require('./package.json').version")
          npx -y "claude-second-brain-${VERSION}.tgz" test-vault

      - name: Verify scaffold
        run: |
          set -e
          fail=0

          check() {
            local label="$1"
            local path="$2"
            if [ -e "$path" ]; then
              echo "PASS: $label"
            else
              echo "FAIL: $label — $path not found"
              fail=1
            fi
          }

          VAULT="$HOME/.claude-second-brain/test-vault"
          check ".gitignore (not .gitignore.template)"     "$VAULT/.gitignore"
          check "wiki/index.md"                            "$VAULT/wiki/index.md"
          check "wiki/log.md"                              "$VAULT/wiki/log.md"
          check "wiki/overview.md"                         "$VAULT/wiki/overview.md"
          check "wiki/sources/"                            "$VAULT/wiki/sources"
          check "wiki/qa/"                                 "$VAULT/wiki/qa"
          check "raw-sources/articles/"                    "$VAULT/raw-sources/articles"
          check "raw-sources/pdfs/"                        "$VAULT/raw-sources/pdfs"
          check "raw-sources/personal/"                    "$VAULT/raw-sources/personal"
          check ".claude/skills/brain-ingest"              "$VAULT/.claude/skills/brain-ingest"
          check ".claude/skills/brain-search"              "$VAULT/.claude/skills/brain-search"
          check ".claude/skills/brain-refresh"             "$VAULT/.claude/skills/brain-refresh"
          check ".claude/skills/brain-rebuild"             "$VAULT/.claude/skills/brain-rebuild"
          check ".claude/skills/lint"                      "$VAULT/.claude/skills/lint"
          check "scripts/qmd/setup.ts"                     "$VAULT/scripts/qmd/setup.ts"
          check "scripts/qmd/reindex.ts"                   "$VAULT/scripts/qmd/reindex.ts"
          check "package.json"                             "$VAULT/package.json"
          check "CLAUDE.md"                                "$VAULT/CLAUDE.md"
          check "mise.toml"                                "$VAULT/mise.toml"
          check ".qmd/index.sqlite (qmd:setup succeeded)"  "$VAULT/.qmd/index.sqlite"
          check "~/.claude-second-brain/config.toml"            "$HOME/.claude-second-brain/config.toml"
          check "~/.claude/skills/brain-ingest/SKILL.md"        "$HOME/.claude/skills/brain-ingest/SKILL.md"
          check "~/.claude/skills/brain-search/SKILL.md"        "$HOME/.claude/skills/brain-search/SKILL.md"
          check "~/.claude/skills/brain-refresh/SKILL.md"       "$HOME/.claude/skills/brain-refresh/SKILL.md"
          check "~/.claude/skills/brain-ingest/.csb-version"    "$HOME/.claude/skills/brain-ingest/.csb-version"
          check "~/.claude/skills/brain-search/.csb-version"    "$HOME/.claude/skills/brain-search/.csb-version"
          check "~/.claude/skills/brain-refresh/.csb-version"   "$HOME/.claude/skills/brain-refresh/.csb-version"

          grep_check() {
            local label="$1"
            local pattern="$2"
            local file="$3"
            if grep -q "$pattern" "$file" 2>/dev/null; then
              echo "PASS: $label"
            else
              echo "FAIL: $label — pattern '$pattern' not found in $file"
              fail=1
            fi
          }

          absent_check() {
            local label="$1"
            local pattern="$2"
            local file="$3"
            if grep -q "$pattern" "$file" 2>/dev/null; then
              echo "FAIL: $label — pattern '$pattern' should be absent from $file"
              fail=1
            else
              echo "PASS: $label"
            fi
          }

          grep_check "CLAUDE.md uses relative INDEX_PATH"      'INDEX_PATH=\.qmd/index\.sqlite' "$VAULT/CLAUDE.md"
          grep_check "setup.ts DB uses relative .qmd path"     '\.qmd.*index\.sqlite'            "$VAULT/scripts/qmd/setup.ts"
          grep_check "config.toml uses default field"          '^default = '                     "$HOME/.claude-second-brain/config.toml"
          for skill in brain-ingest brain-search brain-refresh; do
            grep_check   "global $skill uses claude-second-brain path" 'claude-second-brain path'                        "$HOME/.claude/skills/$skill/SKILL.md"
            grep_check   "global $skill uses claude-second-brain qmd"  'claude-second-brain qmd'                         "$HOME/.claude/skills/$skill/SKILL.md"
            absent_check "global $skill has no legacy QMD_INDEX"       'INDEX_PATH=\$QMD_INDEX'                          "$HOME/.claude/skills/$skill/SKILL.md"
            absent_check "global $skill has no unpatched tokens"       '__QMD_PATH__\|__CSB_CONFIG__'                    "$HOME/.claude/skills/$skill/SKILL.md"
          done

          # New CLI surface (v1.1+): use, positional path, exec, doctor.
          VERSION=$(node -p "require('./package.json').version")
          CSB="npx -y claude-second-brain-${VERSION}.tgz"

          cmd_check() {
            local label="$1"; local expected="$2"; shift 2
            local actual
            actual=$("$@" 2>/dev/null | tail -1)
            if [ "$actual" = "$expected" ]; then
              echo "PASS: $label"
            else
              echo "FAIL: $label — expected '$expected', got '$actual'"
              fail=1
            fi
          }

          # `csb use` — setting current default is a no-op but must succeed
          if $CSB use test-vault > /dev/null 2>&1; then
            echo "PASS: csb use test-vault"
          else
            echo "FAIL: csb use test-vault exited non-zero"; fail=1
          fi

          # `csb path qmd` (positional) should match `csb path --qmd` (legacy)
          POS_QMD=$($CSB path qmd 2>/dev/null)
          LEGACY_QMD=$($CSB path --qmd 2>/dev/null)
          if [ "$POS_QMD" = "$LEGACY_QMD" ] && [ "$POS_QMD" = "$HOME/.claude-second-brain/test-vault/.qmd/index.sqlite" ]; then
            echo "PASS: csb path qmd (positional = legacy flag)"
          else
            echo "FAIL: csb path qmd — positional='$POS_QMD' legacy='$LEGACY_QMD'"; fail=1
          fi

          # `csb path config` (positional) prints central config path
          cmd_check "csb path config" "$HOME/.claude-second-brain/config.toml" $CSB path config

          # `csb exec -- pwd` runs inside the resolved brain's root
          cmd_check "csb exec -- pwd" "$HOME/.claude-second-brain/test-vault" $CSB exec -- pwd

          # `csb doctor` exits 0 on a freshly-scaffolded brain
          if $CSB doctor > /dev/null 2>&1; then
            echo "PASS: csb doctor exits 0"
          else
            echo "FAIL: csb doctor exited non-zero on fresh scaffold"; fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "One or more checks failed."
            exit 1
          fi

          echo ""
          echo "All checks passed."

      - name: Clean up
        if: always()
        run: |
          rm -rf "$HOME/.claude-second-brain/test-vault"
          rm -f "$HOME/.claude-second-brain/config.toml"
          VERSION=$(node -p "require('./package.json').version")
          rm -f "claude-second-brain-${VERSION}.tgz"
          gh repo delete test-vault --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
